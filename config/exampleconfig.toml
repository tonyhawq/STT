# Key names:
# x1 (thumb button 1) x2 (thumb button 2)

[input]
# Hold this key to record voice data
activate = "x2"
# Press this key any time during the
# sending process to cancel
reject = "x1"
activate_globally_blocked = true
radio_modifier = "ctrl"
autosend = true
# Keys that are blocked during chat/say
# Add more here if you consistenly mess up what you're trying to say
blocked_keys = [
    "w", "a", "s", "d", "e", "q", "z", "x",
    "lmb", "rmb", "ctrl", "alt", "space"
]

[output]
# Choose between "say", "chat", or "hwnd"
# hwnd is the best option. There is near no
# latency. Say is second best, and chat
# is the worst option. If you run into issues
# with one of them, try the others and see if
# the issue goes away.
output_method = "hwnd"

[output.say_settings]
# Delay between opening the window and
# sending the message. Increase this
# if you run into issues.
delay_ms = 100

[output.chat_settings]
chat_key = "t"
# Delay between opening chat and
# sending the message. Increase
# this if you run into issues.
chat_delay = 0.75

[output.hwnd_settings]
# To find the automation id of the chat bar,
# open SS13. Open
# C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\inspect.exe
# Click on the chat bar
# Look for the text "automation id"
# Write the number here.
automation_id = 0
# Should the typing indicator show up while
# you are recording your voice?
show_speech_indicator = true

[meta]
# Choose the ASR model you want to use.
# Options: none, parakeet, granite
# FASTEST: parakeet
# MOST ACCURATE: granite
model = "parakeet"
# Alternatively, specify your own model by creating a python script.
# See data/models/parakeetv2 or data/models/granite_speech for implementation.
# Note that the class name must be ASRModel.
# Specify it here with the python filename.

# Where is the STT model file located?
path_to_model = "data/model/"

# Prompt for models that support it. At the moment,
# only granite speech supports prompting. Access the prompt
# inside of shared.ModelLoadingState.
prompt = """<|audio|>transcribe the speech with proper punctuation and capitalization."""

# Words that the program often gets wrong. Only applies
# to prompted models.
keywords = ["felenid"]

# Warns you if the model is loaded to the CPU
# instead of the GPU. Disable if you don't
# have an NVIDIA card or don't care about
# decode speeds.
warn_on_cpu = true

# Minimum length of the audio file for it to be used
# and not ignored. Utterances shorter than this
# will be discared.
# In milliseconds.
minimum_utterance_detection_length = 200

# Minimum length of the audio file sent to the ASR model.
# Padding will be applied.
# In milliseconds.
minimum_utterance_audio_length = 1000

# Do loudness normalization with pyloudnorm before sending
# the audio to the ASR model?
do_loudness_normalization = false

# Enable/disable version checking
enable_version_checking = true
window_width = 300
window_height = 100
verbose = false