# Template:
# [filter name]
# title = "title shown in the window"
# toggle = true / false (Do you need to hold the filter button)
# (optional) color = "some color" (The color of the filter.
#                    accepted colors: https://inventwithpython.com/blog/complete-list-tkinter-colors-valid-and-tested.html)
#                    (defaults to green)
# (optional) text_color = "some color" (The color of the filter's text. Same rules as above) (defaults to black)
# (optional) bind = "some keybind (ctrl + x, alt + 2, `, ?, etc...)"
# (optional) suppress = true / false (true: this keypress isn't shown to the rest of your computer) (defaults to false)
# (optional) group = "name of the group" (affects exclusve)
# (optional) exclusive = true / false (true: only one filter in the same group can be on at once)   (defaults to false)
# action / actions = SEE OTHER SECTION

# --- action ---
# action = "path/to/python/file.py" (filter to enable/disable)
# ---        ---
# This is mutually exclusive with actions. You can either one or the other.
# --------------

# --- actions ---
# actions = ["first action name", "second action name"]
# ---         ---
# The action names have to be unique, and can't collide with any of the other keys,
# such as title, toggle, text_color, group, etc.
# Define the actions as:
# ---         ---
# [filter_name.first action name]
# type = "script" or "filter" or "prompt"
#
# If it is a script:
# script = "path/to/python/file.py" (filter to enable / disable)
#
# If it is a filter:
# mode = "enable" or "disable"
# filter = "name of the filter"
#
# If it is a prompt:
# prompt = "Some system prompt..."
# ---------------

[rage]
title = "Rage"
bind = "unbound"
toggle = true
actions = ["caps", "excited"]

[japanese]
title = "Japanese"
bind = "unbound"
toggle = true
actions = ["setprompt"]

[japanese.setprompt]
type = "prompt"
prompt = """<|audio|>Generate a verbatim Japanese transcript.
Use standard capitalization.
Insert periods, commas, question marks, and apostrophes where appropriate."""

